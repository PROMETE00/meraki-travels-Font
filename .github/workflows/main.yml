name: Frontend CI/CD (Next.js)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app-reservas/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: app-reservas

    - name: Run lint
      run: npm run lint
      working-directory: app-reservas
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app-reservas/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: app-reservas

    - name: Build Next.js
      run: npm run build
      working-directory: app-reservas
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Prepare Image Name
      id: image_name
      run: |
        echo "name=$(echo ${{ github.repository_owner }}/meraki-travels-frontend | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./app-reservas
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:latest
          ${{ env.REGISTRY }}/${{ steps.image_name.outputs.name }}:${{ github.sha }}
