services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: meraki-frontend-app
    restart: always
    environment:
      PORT: ${PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://host.docker.internal:8080}
      DATABASE_URL: ${DATABASE_URL}
      NOCODB_BASE_URL: ${NOCODB_BASE_URL}
      NOCODB_SHARED_VIEW_ID: ${NOCODB_SHARED_VIEW_ID}
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
