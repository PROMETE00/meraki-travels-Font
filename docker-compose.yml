services:
  app:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: ./app-reservas
      args:
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://host.docker.internal:8080}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://merakitravelsbackend.prome.works}
    container_name: app_reservas
    env_file: .env
    environment:
      PORT: ${PORT:-3005}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://merakitravelsbackend.prome.works}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://host.docker.internal:8080}
    ports:
      - "${HOST_PORT:-3005}:${PORT:-3005}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-3005}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: meraki-frontend-tunnel
    restart: unless-stopped
    network_mode: "service:app"
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN:?CLOUDFLARED_TOKEN is required}
    command: tunnel --no-autoupdate --protocol http2 run
